<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchFS - Full Physics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let state = 'HOME'; let parts = []; let currentPart = 'CAPSULE'; 
let pos, vel, angle, fuel, throttle, isIgnited; let stars = []; 
const GRID_SIZE = 30; let chuteDeployed = false;

let moonPos;
const MOON_ALT = -18000;
const MOON_SIZE = 1400;

function setup() {
  createCanvas(windowWidth, windowHeight);
  for (let i = 0; i < 500; i++) stars.push({x: random(-10000, 10000), y: random(-40000, 2000), s: random(1, 3)});
  moonPos = createVector(5000, MOON_ALT);
  resetFlight();
}

function resetFlight() {
  pos = createVector(0, 0); vel = createVector(0, 0);
  angle = 0; throttle = 0; fuel = 0; isIgnited = false; chuteDeployed = false;
}

function draw() {
  if (state === 'HOME') drawHome();
  else if (state === 'EDITOR') drawEditor();
  else if (state === 'FLIGHT') drawFlight();
}

function drawHome() {
  background(10, 15, 25);
  fill(255); textAlign(CENTER); textSize(60); text("LaunchFS", width/2, height/3);
  textSize(18); text("Q/E: STEER | SHIFT/CTRL: THROTTLE", width/2, height/3 + 50);
  fill(0, 120, 255); rect(width/2 - 100, height/2, 200, 60, 10);
  fill(255); textSize(24); text("START", width/2, height/2 + 38);
}

function drawEditor() {
  background(20); stroke(40);
  for (let x = 160; x < width; x += GRID_SIZE) line(x, 0, x, height);
  for (let y = 0; y < height; y += GRID_SIZE) line(160, y, width, y);
  for (let p of parts) drawPart(p, 160 + p.gx*GRID_SIZE, p.gy*GRID_SIZE, false);
  
  noStroke(); fill(30); rect(0, 0, 160, height);
  let menu = ['CAPSULE', 'CONE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
  for (let i = 0; i < menu.length; i++) {
    fill(currentPart === menu[i] ? [0, 120, 255] : 60);
    rect(10, 10 + i * 52, 140, 48, 5);
    fill(255); textSize(10); textAlign(CENTER); text(menu[i], 80, 40 + i * 52);
  }
  fill(100); rect(10, height-60, 140, 45, 5); fill(255); text("HOME", 80, height-32);
  fill(0, 200, 100); rect(width-150, 20, 130, 60, 10); fill(255); text("LAUNCH", width-85, 55);
}

function drawFlight() {
  let alt = abs(pos.y);
  background(lerpColor(color(100, 180, 255), color(0), map(alt, 0, 8000, 0, 1)));
  
  push();
  translate(width/2, height/2); translate(-pos.x, -pos.y + height/4);
  fill(255); noStroke(); for(let s of stars) circle(s.x, s.y, s.s);
  fill(200); circle(moonPos.x, moonPos.y, MOON_SIZE);
  fill(50); rect(-10000, 25, 20000, 2000); 

  // --- PHYSICS ENGINE ---
  let lowestY = 0;
  for(let p of parts) {
      let py = (p.gy - parts[0].gy) * 30 + (p.type === 'TANK_LRG' ? 60 : 30);
      if (py > lowestY) lowestY = py;
  }

  let dMoon = dist(pos.x, pos.y, moonPos.x, moonPos.y);
  if (dMoon < MOON_SIZE/2 + lowestY) {
      if (vel.mag() > 6) { resetFlight(); state = 'EDITOR'; } 
      vel.mult(0.5); if(dMoon < MOON_SIZE/2) pos.sub(vel);
  } else if (pos.y + lowestY >= 25) {
      if (vel.y > 5) { resetFlight(); state = 'EDITOR'; } 
      vel.y = 0; vel.x *= 0.8; pos.y = 25 - lowestY;
  } else {
      vel.add(0, 0.12); // Gravity
      if(dMoon < 3000) vel.add(p5.Vector.sub(moonPos, pos).normalize().mult(0.2));
  }

  if (keyIsDown(81)) angle -= 0.04; // Q
  if (keyIsDown(69)) angle += 0.04; // E
  if (keyIsDown(SHIFT)) throttle = min(throttle + 0.02, 1);
  if (keyIsDown(CONTROL)) throttle = max(throttle - 0.02, 0);

  if (isIgnited && fuel > 0) {
    let totalThrust = 0;
    for (let p of parts) {
      if (p.type.startsWith('ENG') && p.active) {
        let pwr = p.type === 'ENG_LRG' ? 0.9 : 0.5;
        totalThrust += pwr;
        fill(255, 100, 0); 
        let fx = pos.x + (p.gx-parts[0].gx)*30 + 15;
        let fy = pos.y + (p.gy-parts[0].gy)*30 + 30;
        circle(fx, fy, throttle * 40);
      }
    }
    vel.add(p5.Vector.fromAngle(angle - HALF_PI).mult(throttle * (totalThrust / max(1, parts.length/3))));
    fuel -= throttle * totalThrust * 0.05;
  }

  if (chuteDeployed) { vel.y *= 0.94; fill(255, 0, 0); arc(pos.x, pos.y - 60, 80, 60, PI, 0); }

  pos.add(vel);
  push(); translate(pos.x, pos.y); rotate(angle);
  let ox = parts[0].gx, oy = parts[0].gy;
  for (let p of parts) drawPart(p, (p.gx-ox)*30, (p.gy-oy)*30, p.active);
  pop(); pop();

  drawFlightUI();
}

function drawPart(p, x, y, active) {
  stroke(0);
  if (p.type === 'CAPSULE') { fill(200); rect(x, y, 30, 30, 5); }
  else if (p.type === 'CONE') { fill(150, 0, 0); triangle(x, y+30, x+30, y+30, x+15, y); }
  else if (p.type.startsWith('TANK')) { fill(255); rect(x, y, 30, p.type === 'TANK_LRG' ? 60 : 40); }
  else if (p.type.startsWith('ENG')) { fill(active ? [255, 150, 0] : 80); rect(x+5, y, 20, 20); }
  else if (p.type === 'SEP') { fill(255, 200, 0); rect(x, y+10, 30, 10); }
}

function drawFlightUI() {
  fill(0, 150); noStroke(); rect(10, 10, 180, 120, 10);
  fill(255); textAlign(LEFT); textSize(14);
  text("ALT: " + floor(abs(pos.y)) + " m", 25, 40);
  text("V-VEL: " + nf(vel.y, 1, 1), 25, 70);
  text("FUEL: " + floor(max(0, fuel)), 25, 100);

  fill(50); rect(20, height/2 - 100, 30, 200, 5); 
  fill(0, 200, 100); rect(20, height/2 + 100, 30, -throttle * 200, 5); 

  fill(isIgnited ? [255, 50, 50] : [100, 100, 100]);
  rect(width - 120, height - 80, 100, 60, 10);
  fill(255); textAlign(CENTER); text(isIgnited ? "ON" : "IGNITE", width - 70, height - 45);

  fill(60); rect(width - 120, 20, 100, 40, 5);
  fill(255); text("EXIT", width - 70, 45);
}

function mousePressed() {
  if (state === 'HOME') state = 'EDITOR';
  else if (state === 'EDITOR') {
    if (mouseX < 160) {
      if (mouseY > height - 60) state = 'HOME';
      else {
        let idx = floor((mouseY-10)/52);
        let m = ['CAPSULE', 'CONE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
        if(idx >= 0 && idx < m.length) currentPart = m[idx];
      }
    } else if (mouseX > width-150 && mouseY < 80) {
      if(parts.length > 0) { state = 'FLIGHT'; fuel = parts.length * 500; pos.y = -80; }
    } else {
      let gx = floor((mouseX-160)/GRID_SIZE), gy = floor(mouseY/GRID_SIZE);
      if (currentPart === 'DELETE') parts = parts.filter(p => !(p.gx === gx && p.gy === gy));
      else parts.push({type: currentPart, gx, gy, active: false});
    }
  } else if (state === 'FLIGHT') {
    if (mouseX > width-120 && mouseX < width-20 && mouseY > height-80 && mouseY < height-20) isIgnited = !isIgnited;
    if (mouseX > width-120 && mouseX < width-20 && mouseY > 20 && mouseY < 60) { state = 'EDITOR'; resetFlight(); }
    let mx = mouseX - width/2 + pos.x, my = mouseY - height/2 + pos.y - height/4;
    for(let p of parts) {
      let px = (p.gx-parts[0].gx)*30, py = (p.gy-parts[0].gy)*30;
      if(mx > px && mx < px+30 && my > py && my < py+30 && p.type.startsWith('ENG')) p.active = !p.active;
    }
  }
}

function keyPressed() {
  if (state === 'FLIGHT') {
    if (keyCode === 32) isIgnited = !isIgnited;
    if (key === 'p') chuteDeployed = true;
    if (key === 's') {
        let sepY = -1;
        for(let i=parts.length-1; i>=0; i--) if(parts[i].type === 'SEP') { sepY = parts[i].gy; parts.splice(i, 1); break; }
        if(sepY != -1) parts = parts.filter(p => p.gy < sepY);
    }
  }
}
function windowResized() { createCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
