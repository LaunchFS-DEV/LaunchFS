<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchFS - Pro Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let state = 'HOME'; let parts = []; let currentPart = 'CAPSULE'; 
let pos, vel, angle, fuel, throttle, isIgnited; let stars = []; 
const GRID_SIZE = 30; let chuteDeployed = false;
let moonPos, marsPos;
let showMap = false;

// Audio
let noise, osc, env, musicStarted = false;

function setup() {
  createCanvas(windowWidth, windowHeight);
  for (let i = 0; i < 800; i++) {
    stars.push({x: random(-50000, 50000), y: random(-120000, 10000), s: random(0.5, 3), b: random(100, 255)});
  }
  moonPos = createVector(15000, -45000);
  marsPos = createVector(-25000, -110000);
  
  noise = new p5.Noise('brown'); noise.amp(0); noise.start();
  osc = new p5.Oscillator('triangle'); env = new p5.Envelope();
  env.setADSR(0.1, 0.2, 0.1, 0.5); osc.amp(env); osc.start();

  resetFlight();
}

function resetFlight() {
  pos = createVector(0, 0); vel = createVector(0, 0);
  angle = 0; throttle = 0; fuel = 0; isIgnited = false; chuteDeployed = false; showMap = false;
}

function updateAudio() {
  if (!musicStarted) return;
  if (state === 'HOME' || state === 'EDITOR') {
    if (frameCount % 120 === 0) { osc.freq(random([220, 261, 329])); env.play(); }
    noise.amp(0);
  } else if (state === 'FLIGHT') {
    noise.amp(isIgnited && fuel > 0 ? map(throttle, 0, 1, 0, 0.3) : 0);
  }
}

function draw() {
  updateAudio();
  if (state === 'HOME') drawHome();
  else if (state === 'EDITOR') drawEditor();
  else if (state === 'FLIGHT') drawFlight();
}

function drawHome() {
  background(5, 8, 15);
  noStroke(); for(let s of stars) { fill(255, s.b * 0.3); circle(s.x/30 + width/2, s.y/30 + height/2, s.s); }
  textAlign(CENTER); fill(255); textSize(60); text("LAUNCH FS", width/2, height/3);
  fill(0, 150, 255); textSize(16); text("FULL SIMULATION MODE", width/2, height/3 + 40);
  fill(0, 90, 210); rect(width/2 - 100, height/2 - 30, 200, 60, 30);
  fill(255); textSize(20); text("BEGIN", width/2, height/2 + 8);
}

function drawEditor() {
  background(12); stroke(30);
  for (let x = 160; x < width; x += GRID_SIZE) line(x, 0, x, height);
  for (let y = 0; y < height; y += GRID_SIZE) line(160, y, width, y);
  for (let p of parts) drawPart(p, 160 + p.gx*GRID_SIZE, p.gy*GRID_SIZE, false);
  noStroke(); fill(20); rect(0, 0, 160, height);
  let menu = ['CAPSULE', 'CONE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
  for (let i = 0; i < menu.length; i++) {
    fill(currentPart === menu[i] ? [0, 110, 230] : 40);
    rect(10, 10 + i * 52, 140, 48, 4);
    fill(255); textSize(10); textAlign(CENTER); text(menu[i], 80, 38 + i * 52);
  }
  fill(0, 160, 70); rect(width-160, 20, 140, 60, 10); fill(255); text("LAUNCH", width-90, 56);
}

function drawFlight() {
  let alt = abs(pos.y);
  let atmosphereDensity = map(alt, 0, 15000, 1, 0, true);
  
  if (showMap) {
    drawMap();
    return;
  }

  background(lerpColor(color(70, 130, 230), color(0, 2, 10), map(alt, 0, 20000, 0, 1)));
  
  push();
  translate(width/2, height/2); translate(-pos.x, -pos.y + height/4);
  
  // Draw Trajectory
  stroke(255, 150); strokeWeight(2); noFill();
  beginShape();
  let tx = pos.x, ty = pos.y, tvx = vel.x, tvy = vel.y;
  for(let i=0; i<150; i++) {
      vertex(tx, ty);
      tvx *= (1 - 0.004 * map(abs(ty), 0, 15000, 1, 0, true));
      tvy += 0.25; 
      tx += tvx * 6; ty += tvy * 6;
      if(ty > 20) break;
  }
  endShape();

  noStroke(); for(let s of stars) { fill(255, s.b); circle(s.x, s.y, s.s); }
  
  // Celestial Bodies
  fill(230); circle(moonPos.x, moonPos.y, 1400); // Moon
  fill(180, 60, 40); circle(marsPos.x, marsPos.y, 3000); // Mars
  fill(25, 28, 35); rect(-100000, 25, 200000, 5000); // Earth

  // --- PHYSICS ---
  let lowestY = 0;
  for(let p of parts) {
      let py = (p.gy - parts[0].gy) * 30 + (p.type === 'TANK_LRG' ? 60 : 30);
      if (py > lowestY) lowestY = py;
  }

  if (pos.y + lowestY >= 20) {
      if (vel.y > 7) { resetFlight(); state = 'EDITOR'; } 
      vel.y = 0; vel.x *= 0.8; pos.y = 20 - lowestY;
  } else {
      vel.add(0, 0.25); // Strong Gravity
      vel.mult(1 - (0.01 * atmosphereDensity)); // Air Drag
  }

  if (chuteDeployed) {
      vel.y *= 0.92; vel.x *= 0.95;
      stroke(255); line(pos.x, pos.y, pos.x - 20, pos.y - 70); line(pos.x, pos.y, pos.x + 20, pos.y - 70);
      fill(200, 0, 0); arc(pos.x, pos.y - 70, 100, 80, PI, 0, CHORD);
  }

  if (keyIsDown(81)) angle -= 0.04; 
  if (keyIsDown(69)) angle += 0.04; 
  if (keyIsDown(SHIFT)) throttle = min(throttle + 0.01, 1);
  if (keyIsDown(CONTROL)) throttle = max(throttle - 0.01, 0);

  if (isIgnited && fuel > 0) {
    let pwrSum = 0;
    for (let p of parts) {
      if (p.type.startsWith('ENG') && p.active) {
        let pwr = (p.type === 'ENG_LRG' ? 1.9 : 1.0);
        pwrSum += pwr;
        fill(255, 150, 0, 200); circle(pos.x + (p.gx-parts[0].gx)*30 + 15, pos.y + (p.gy-parts[0].gy)*30 + 35, throttle * 55);
      }
    }
    let thrust = p5.Vector.fromAngle(angle - HALF_PI).mult(throttle * (pwrSum / (parts.length * 0.45)));
    vel.add(thrust);
    fuel -= throttle * pwrSum * 0.18; 
  }

  pos.add(vel);
  push(); translate(pos.x, pos.y); rotate(angle);
  let ox = parts[0].gx, oy = parts[0].gy;
  for (let p of parts) drawPart(p, (p.gx-ox)*30, (p.gy-oy)*30, p.active);
  pop(); pop();
  drawFlightUI(atmosphereDensity);
}

function drawPart(p, x, y, active) {
  stroke(0); strokeWeight(1);
  if (p.type === 'CAPSULE') { 
    fill(160); rect(x, y, 30, 30, 12, 12, 2, 2); 
    fill(0, 100, 200); circle(x+15, y+10, 10); // Window
  }
  else if (p.type === 'CONE') {
    fill(180, 50, 50); triangle(x, y+30, x+30, y+30, x+15, y);
    fill(255, 60); triangle(x+5, y+28, x+12, y+28, x+15, y+5); // Shading
  }
  else if (p.type.startsWith('TANK')) { 
    let h = p.type === 'TANK_LRG' ? 60 : 40;
    fill(235); rect(x, y, 30, h); 
    for(let i=0; i<30; i+=6) { stroke(0, 30); line(x+i, y, x+i, y+h); } // Metallic grain
    noStroke(); fill(0, 25); rect(x+22, y, 8, h); // Side shadow
  }
  else if (p.type.startsWith('ENG')) { 
    fill(45); rect(x+6, y, 18, 12);
    fill(active ? [255, 150, 0] : 85); arc(x+15, y+28, 26, 22, PI, 0); 
  }
  else if (p.type === 'SEP') { fill(220, 180, 0); rect(x, y+10, 30, 10); }
}

function drawFlightUI(atm) {
  fill(0, 180); noStroke(); rect(15, 15, 200, 160, 10);
  fill(255); textAlign(LEFT); textSize(12);
  text("ALTITUDE: " + floor(abs(pos.y)) + "m", 30, 45);
  text("VELOCITY: " + floor(vel.mag() * 10) + "m/s", 30, 70);
  text("FUEL: " + floor(max(0, fuel)), 30, 95);
  text("ATMOSPHERE: " + floor(atm * 100) + "%", 30, 120);
  text("MAP: PRESS 'M' | CHUTE: 'P'", 30, 145);

  // Throttle
  fill(40); rect(25, height/2 - 100, 20, 200, 5);
  fill(0, 200, 100); rect(25, height/2 + 100, 20, -throttle * 200, 5);

  // Ignition
  fill(isIgnited ? [255, 50, 50] : 80); rect(width - 110, height - 80, 90, 60, 10);
  fill(255); textAlign(CENTER); text(isIgnited ? "ON" : "IGNITE", width - 65, height - 45);
}

function drawMap() {
    background(5);
    let scale = 0.004;
    let centerX = width/2 - pos.x * scale;
    let centerY = height/2 - pos.y * scale;
    
    // Draw Orbits
    noFill(); stroke(50);
    circle(centerX, centerY, 45000 * 2 * scale);
    circle(centerX, centerY, 110000 * 2 * scale);

    // Planets
    noStroke();
    fill(0, 120, 255); circle(centerX, centerY + (25 * scale), 1500 * scale); // Earth
    fill(200); circle(centerX + moonPos.x * scale, centerY + moonPos.y * scale, 1400 * scale); // Moon
    fill(255, 50, 0); circle(centerX + marsPos.x * scale, centerY + marsPos.y * scale, 3000 * scale); // Mars
    
    // Trajectory on Map
    stroke(255, 100); noFill();
    beginShape();
    let mtx = pos.x, mty = pos.y, mtvx = vel.x, mtvy = vel.y;
    for(let i=0; i<300; i++) {
        vertex(centerX + mtx * scale, centerY + mty * scale);
        mtvx *= (1 - 0.002 * map(abs(mty), 0, 15000, 1, 0, true));
        mtvy += 0.25; mtx += mtvx * 10; mty += mtvy * 10;
        if(mty > 25) break;
    }
    endShape();

    fill(0, 255, 0); circle(width/2, height/2, 8); // Player
    textAlign(CENTER); fill(255); text("STRATEGIC MAP - PRESS 'M' TO EXIT", width/2, height - 50);
}

function mousePressed() {
  if (!musicStarted) { userStartAudio(); musicStarted = true; }
  if (state === 'HOME') state = 'EDITOR';
  else if (state === 'EDITOR') {
    if (mouseX > width-160 && mouseY < 80) {
      if(parts.length > 0) { state = 'FLIGHT'; fuel = parts.length * 300; pos.y = -50; for(let p of parts) if(p.type.includes('ENG')) p.active = true; }
    } else {
      let gx = floor((mouseX-160)/GRID_SIZE), gy = floor(mouseY/GRID_SIZE);
      if (mouseX > 160) parts.push({type: currentPart, gx, gy, active: false});
      else {
        let idx = floor((mouseY-10)/52);
        let m = ['CAPSULE', 'CONE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
        if(idx < m.length) currentPart = m[idx];
      }
    }
  } else if (state === 'FLIGHT') {
    if (mouseX > width - 110 && mouseY > height - 80) isIgnited = !isIgnited;
  }
}

function keyPressed() {
    if (key === 'm' || key === 'M') showMap = !showMap;
    if (key === 'p' || key === 'P') chuteDeployed = !chuteDeployed;
    if (keyCode === 32) isIgnited = !isIgnited;
}

function windowResized() { createCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
