<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaunchFS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let state = 'HOME'; let parts = []; let currentPart = 'TANK_MED'; 
let pos, vel, angle, fuel, throttle, isIgnited; let stars = []; const GRID_SIZE = 30;

function setup() {
  createCanvas(windowWidth, windowHeight);
  for (let i = 0; i < 300; i++) stars.push({x: random(-2000, 2000), y: random(-5000, 0), s: random(1,3)});
  resetFlight();
}

function resetFlight() {
  pos = createVector(0, 0); vel = createVector(0, 0);
  angle = 0; throttle = 0; fuel = 0; isIgnited = false;
}

function draw() {
  if (state === 'HOME') drawHome();
  else if (state === 'EDITOR') drawEditor();
  else if (state === 'FLIGHT') drawFlight();
}

function drawHome() {
  background(15, 25, 45); textAlign(CENTER); fill(255);
  textSize(60); text("LaunchFS", width/2, height/3);
  fill(0, 120, 255); rect(width/2 - 125, height/2, 250, 70, 15);
  fill(255); textSize(30); text("START BUILD", width/2, height/2 + 45);
}

function drawEditor() {
  background(30); stroke(50);
  for (let x = 150; x < width; x += GRID_SIZE) line(x, 0, x, height);
  for (let y = 0; y < height; y += GRID_SIZE) line(150, y, width, y);
  for (let p of parts) drawPart(p, 150 + p.gx*GRID_SIZE, p.gy*GRID_SIZE, false);
  noStroke(); fill(20); rect(0, 0, 150, height);
  let menu = ['CAPSULE', 'CONE', 'TANK_SML', 'TANK_MED', 'TANK_LRG', 'SEP', 'ENG_SML', 'ENG_MED', 'ENG_LRG'];
  for (let i = 0; i < menu.length; i++) {
    fill(currentPart === menu[i] ? [0, 150, 255] : 60);
    rect(10, 10 + i * 52, 130, 45, 5);
    fill(255); textSize(10); textAlign(CENTER); text(menu[i], 75, 38 + i * 52);
  }
  fill(0, 200, 100); rect(width-160, 20, 140, 60, 10);
  fill(255); textSize(20); text("LAUNCH", width-90, 55);
  if(mouseX > 150) { fill(255, 30); rect(floor(mouseX/GRID_SIZE)*GRID_SIZE, floor(mouseY/GRID_SIZE)*GRID_SIZE, GRID_SIZE, GRID_SIZE); }
}

function drawFlight() {
  let alt = abs(pos.y);
  background(lerpColor(color(100, 180, 255), color(0), map(alt, 0, 10000, 0, 1)));
  translate(width/2, height/2); translate(-pos.x, -pos.y + height/4);
  fill(255, map(alt, 1000, 5000, 0, 255));
  for(let s of stars) circle(s.x, s.y, s.s);
  fill(40); noStroke(); rect(-5000, 45, 10000, 1000);
  fill(80); rect(-150, 25, 300, 20);
  if (pos.y < 0) vel.add(0, 0.12);
  else { vel.mult(0.8); pos.y = 0; vel.y = min(vel.y, 0); }
  if (isIgnited && fuel > 0) {
    for (let p of parts) {
      if (p.type.startsWith('ENG') && p.active) {
        let pwr = p.type === 'ENG_LRG' ? 0.7 : (p.type === 'ENG_MED' ? 0.4 : 0.2);
        vel.add(p5.Vector.fromAngle(angle - HALF_PI).mult(throttle * pwr));
        fuel -= throttle * pwr * 0.1;
        fill(255, 150, 0);
        let fx = pos.x + (p.gx - parts[0].gx)*GRID_SIZE + 15;
        let fy = pos.y + (p.gy - parts[0].gy)*GRID_SIZE + 25;
        circle(fx + random(-3,3), fy + random(10, 20), throttle * 50);
      }
    }
  }
  if (keyIsDown(LEFT_ARROW)) angle -= 0.04;
  if (keyIsDown(RIGHT_ARROW)) angle += 0.04;
  if (keyIsDown(SHIFT)) throttle = min(throttle + 0.01, 1.0);
  if (keyIsDown(CONTROL)) throttle = max(throttle - 0.01, 0.0);
  pos.add(vel);
  push(); translate(pos.x, pos.y); rotate(angle);
  let ox = parts[0].gx; let oy = parts[0].gy;
  for (let p of parts) drawPart(p, (p.gx - ox) * GRID_SIZE, (p.gy - oy) * GRID_SIZE, p.active);
  pop();
  resetMatrix(); drawFlightUI();
}

function drawPart(p, x, y, active) {
  stroke(0); strokeWeight(1);
  if (p.type === 'CAPSULE') { fill(200); rect(x, y, 30, 30, 5); fill(0, 150, 255); circle(x+15, y+15, 10); }
  else if (p.type === 'CONE') { fill(180, 0, 0); triangle(x, y+30, x+30, y+30, x+15, y); }
  else if (p.type.startsWith('TANK')) { fill(245); let h = p.type === 'TANK_LRG' ? 60 : (p.type === 'TANK_MED' ? 40 : 20); rect(x, y, 30, h); }
  else if (p.type === 'SEP') { fill(255, 230, 0); rect(x, y+10, 30, 10); }
  else if (p.type.startsWith('ENG')) { fill(active ? color(255, 100, 0) : 60); rect(x+5, y, 20, 15); arc(x+15, y+25, 30, 20, PI, 0); }
}

function drawFlightUI() {
  fill(0, 150); rect(10, 10, 220, 120, 10);
  fill(255); textAlign(LEFT); textSize(16);
  text("ALT: " + floor(abs(pos.y)) + "m", 25, 40);
  text("FUEL: " + floor(max(0, fuel)), 25, 70);
  text("THROTTLE: " + floor(throttle*100) + "%", 25, 100);
  textAlign(CENTER); textSize(12); text("CLICK ENGINES TO ARM | SPACE: IGNITE | S: SEPARATE", width/2, height-20);
}

function mousePressed() {
  if (state === 'HOME') state = 'EDITOR';
  else if (state === 'EDITOR') {
    if (mouseX < 150) {
      let idx = floor((mouseY-10)/52);
      let m = ['CAPSULE', 'CONE', 'TANK_SML', 'TANK_MED', 'TANK_LRG', 'SEP', 'ENG_SML', 'ENG_MED', 'ENG_LRG'];
      if(idx >= 0 && idx < m.length) currentPart = m[idx];
    } else if (mouseX > width-160 && mouseY < 80) {
      if(parts.length > 0) { state = 'FLIGHT'; fuel = parts.filter(p => p.type.startsWith('TANK')).length * 400; }
    } else { parts.push({type: currentPart, gx: floor((mouseX-150)/GRID_SIZE), gy: floor(mouseY/GRID_SIZE), active: false}); }
  } else if (state === 'FLIGHT') {
    let mx = mouseX - width/2 + pos.x; let my = mouseY - height/2 + pos.y - height/4;
    for(let p of parts) {
      let px = (p.gx - parts[0].gx)*GRID_SIZE; let py = (p.gy - parts[0].gy)*GRID_SIZE;
      if(mx > px && mx < px+30 && my > py && my < py+30 && p.type.startsWith('ENG')) p.active = !p.active;
    }
  }
}

function keyPressed() {
  if (state === 'FLIGHT') {
    if (keyCode === 32) isIgnited = !isIgnited;
    if (key === 's' || key === 'S') {
      let sepY = -1;
      for(let i=parts.length-1; i>=0; i--) { if(parts[i].type === 'SEP') { sepY = parts[i].gy; parts.splice(i, 1); } }
      if(sepY != -1) parts = parts.filter(p => p.gy < sepY);
    }
  }
}

function windowResized() { createCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
