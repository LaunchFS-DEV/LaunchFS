<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchFS - Pro Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let state = 'HOME'; let parts = []; let currentPart = 'TANK_MED'; 
let pos, vel, angle, fuel, throttle, isIgnited; let stars = []; 
const GRID_SIZE = 30; let chuteDeployed = false;

// World Settings
let moonPos;
const MOON_ALT = -15000;
const MOON_SIZE = 1200;

function setup() {
  createCanvas(windowWidth, windowHeight);
  // Generate high-density starfield
  for (let i = 0; i < 600; i++) {
    stars.push({x: random(-10000, 10000), y: random(-30000, 2000), s: random(0.5, 2.5), b: random(100, 255)});
  }
  moonPos = createVector(4000, MOON_ALT);
  resetFlight();
}

function resetFlight() {
  pos = createVector(0, 0); vel = createVector(0, 0);
  angle = 0; throttle = 0; fuel = 0; isIgnited = false; chuteDeployed = false;
}

function draw() {
  if (state === 'HOME') drawHome();
  else if (state === 'EDITOR') drawEditor();
  else if (state === 'FLIGHT') drawFlight();
}

function drawHome() {
  background(5, 10, 20);
  // Realistic Stars in Background
  noStroke();
  for(let s of stars) { fill(255, s.b); circle(s.x/10 + width/2, s.y/10 + height/2, s.s); }
  
  // Logo & Title
  textAlign(CENTER);
  fill(255); textSize(60); text("LAUNCH FS", width/2, height/3);
  fill(0, 150, 255); textSize(20); text("SPACEFLIGHT SIMULATOR", width/2, height/3 + 40);
  
  // Controls Card
  fill(255, 20); rect(width/2 - 200, height/2 + 80, 400, 100, 10);
  fill(200); textSize(14);
  text("WASD / ARROWS : CONTROL ROCKET\nSHIFT / CTRL : THROTTLE\nSPACE : IGNITION | P : PARACHUTE | S : STAGING", width/2, height/2 + 115);

  // Play Button
  let hover = (mouseX > width/2-100 && mouseX < width/2+100 && mouseY > height/2 && mouseY < height/2+60);
  fill(hover ? [0, 180, 255] : [0, 100, 255]);
  rect(width/2 - 100, height/2, 200, 60, 30);
  fill(255); textSize(24); text("NEW MISSION", width/2, height/2 + 38);
}

function drawEditor() {
  background(15);
  // Grid detatiling
  stroke(30); strokeWeight(1);
  for (let x = 150; x < width; x += GRID_SIZE) line(x, 0, x, height);
  for (let y = 0; y < height; y += GRID_SIZE) line(150, y, width, y);
  
  for (let p of parts) drawPart(p, 150 + p.gx*GRID_SIZE, p.gy*GRID_SIZE, false);
  
  // Sidebar
  noStroke(); fill(25); rect(0, 0, 150, height);
  let menu = ['CAPSULE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
  for (let i = 0; i < menu.length; i++) {
    let isDel = menu[i] === 'DELETE';
    fill(currentPart === menu[i] ? (isDel ? [200, 50, 50] : [0, 120, 255]) : 45);
    rect(10, 10 + i * 55, 130, 50, 5);
    fill(255); textSize(11); textAlign(CENTER); text(menu[i], 75, 40 + i * 55);
  }
  
  // Navigation
  fill(80); rect(10, height-60, 130, 45, 5); fill(255); text("MAIN MENU", 75, height-32);
  fill(0, 180, 80); rect(width-160, 20, 140, 60, 10); fill(255); textSize(18); text("LAUNCH", width-90, 56);
  
  if(mouseX > 150) { fill(255, 40); rect(floor(mouseX/GRID_SIZE)*GRID_SIZE, floor(mouseY/GRID_SIZE)*GRID_SIZE, GRID_SIZE, GRID_SIZE); }
}

function drawFlight() {
  let alt = abs(pos.y);
  let sky = lerpColor(color(80, 150, 255), color(0), map(alt, 0, 8000, 0, 1));
  background(sky);
  
  push();
  translate(width/2, height/2);
  translate(-pos.x, -pos.y + height/4);

  // Deep Space Stars
  noStroke(); for(let s of stars) { fill(255, s.b); circle(s.x, s.y, s.s); }
  
  // Realistic Moon
  fill(220); stroke(180); strokeWeight(2); circle(moonPos.x, moonPos.y, MOON_SIZE);
  noStroke(); fill(180); circle(moonPos.x - 200, moonPos.y + 100, 120); circle(moonPos.x + 300, moonPos.y - 150, 200);
  fill(160); circle(moonPos.x + 50, moonPos.y + 300, 80);

  // Ground / Atmosphere
  fill(20, 20, 25); noStroke(); rect(-10000, 25, 20000, 5000); 
  fill(100); rect(-200, 20, 400, 10); // Pad

  // Physics
  let dMoon = dist(pos.x, pos.y, moonPos.x, moonPos.y);
  if (dMoon < MOON_SIZE/2 + 20) {
      vel.mult(0.85); if(dMoon < MOON_SIZE/2) pos.sub(vel);
  } else if (alt > 5) {
      vel.add(0, 0.12); // Gravity
      if(dMoon < 3000) vel.add(p5.Vector.sub(moonPos, pos).normalize().mult(0.25));
  } else {
      vel.mult(0.8); pos.y = 0; vel.y = min(vel.y, 0);
  }

  // Parachute Visuals
  if (chuteDeployed) {
      vel.y *= 0.94; vel.x *= 0.97;
      stroke(200); strokeWeight(1);
      line(pos.x, pos.y, pos.x - 20, pos.y - 100); line(pos.x, pos.y, pos.x + 20, pos.y - 100);
      fill(220, 50, 50); noStroke();
      for(let i=0; i<5; i++) { // Striped chute
        fill(i % 2 == 0 ? [200, 0, 0] : 255);
        arc(pos.x, pos.y - 100, 100, 80, PI + (i*0.6), PI + ((i+1)*0.6), CHORD);
      }
  }

  // Engine Plume
  if (isIgnited && fuel > 0) {
    for (let p of parts) {
      if (p.type.startsWith('ENG') && p.active) {
        let pwr = p.type === 'ENG_LRG' ? 0.7 : 0.4;
        vel.add(p5.Vector.fromAngle(angle - HALF_PI).mult(throttle * pwr));
        fuel -= throttle * pwr * 0.08;
        // Realistic fire
        for(let i=0; i<3; i++) {
          fill(255, 150 + i*30, 0, 200 - i*50);
          circle(pos.x + (p.gx-parts[0].gx)*30 + 15, pos.y + (p.gy-parts[0].gy)*30 + 25 + i*10, throttle * (40 - i*10));
        }
      }
    }
  }

  pos.add(vel);
  push(); translate(pos.x, pos.y); rotate(angle);
  let ox = parts[0].gx, oy = parts[0].gy;
  for (let p of parts) drawPart(p, (p.gx-ox)*30, (p.gy-oy)*30, p.active);
  pop(); pop();

  drawFlightUI();
}

function drawPart(p, x, y, active) {
  stroke(0); strokeWeight(1);
  if (p.type === 'CAPSULE') { 
    fill(180); rect(x, y, 30, 30, 10, 10, 2, 2); 
    fill(50, 150, 255); circle(x+15, y+12, 12); // Window
  }
  else if (p.type.startsWith('TANK')) { 
    let h = p.type === 'TANK_LRG' ? 60 : 40;
    fill(240); rect(x, y, 30, h); 
    fill(200); rect(x+2, y+5, 26, 2); // Rivet detail
    rect(x+2, y+h-7, 26, 2);
  }
  else if (p.type.startsWith('ENG')) { 
    fill(50); rect(x+5, y, 20, 10);
    fill(active ? [255, 100, 0] : 70); arc(x+15, y+25, 28, 20, PI, 0); 
  }
  else if (p.type === 'SEP') { fill(255, 200, 0); rect(x, y+10, 30, 10); fill(0); rect(x+12, y+12, 6, 6); }
}

function drawFlightUI() {
  fill(0, 150); noStroke(); rect(15, 15, 220, 150, 15);
  fill(255); textAlign(LEFT); textSize(14);
  text("ALTITUDE: " + floor(abs(pos.y)) + " m", 35, 45);
  text("V-VEL: " + nf(-vel.y, 1, 1) + " m/s", 35, 75);
  text("H-VEL: " + nf(vel.x, 1, 1) + " m/s", 35, 105);
  fill(fuel < 100 ? [255, 50, 50] : 255);
  text("FUEL: " + floor(max(0, fuel)) + " kg", 35, 135);
  
  // High-Tech Map
  fill(0, 150); rect(width-175, 15, 160, 160, 15);
  stroke(255, 50); noFill(); circle(width-95, 145, 120); // Earth
  fill(255); noStroke();
  let mx = map(moonPos.x - pos.x, -10000, 10000, width-175, width-15);
  let my = map(moonPos.y - pos.y, -20000, 5000, 15, 175);
  fill(200); circle(mx, my, 18); // Moon
  fill(0, 255, 100); circle(width-95, 95, 6); // Rocket

  fill(60); rect(width-90, height-55, 80, 45, 10);
  fill(255); textAlign(CENTER); text("ABORT", width-50, height-27);
}

function mousePressed() {
  if (state === 'HOME') state = 'EDITOR';
  else if (state === 'EDITOR') {
    if (mouseX < 150) {
      if (mouseY > height - 60) state = 'HOME';
      else {
        let idx = floor((mouseY-10)/55);
        let m = ['CAPSULE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
        if(idx >= 0 && idx < m.length) currentPart = m[idx];
      }
    } else if (mouseX > width-160 && mouseY < 80) {
      if(parts.length > 0) { 
          state = 'FLIGHT'; 
          fuel = parts.filter(p => p.type.includes('TANK')).length * 500;
          pos.y = -80; 
      }
    } else {
      let gx = floor((mouseX-150)/GRID_SIZE), gy = floor(mouseY/GRID_SIZE);
      if (currentPart === 'DELETE') parts = parts.filter(p => !(p.gx === gx && p.gy === gy));
      else parts.push({type: currentPart, gx, gy, active: false});
    }
  } else if (state === 'FLIGHT') {
    if (mouseX > width-90 && mouseY > height-55) { state = 'EDITOR'; resetFlight(); }
    let mx = mouseX - width/2 + pos.x, my = mouseY - height/2 + pos.y - height/4;
    for(let p of parts) {
      let px = (p.gx-parts[0].gx)*30, py = (p.gy-parts[0].gy)*30;
      if(mx > px && mx < px+30 && my > py && my < py+30 && p.type.startsWith('ENG')) p.active = !p.active;
    }
  }
}

function keyPressed() {
  if (state === 'FLIGHT') {
    if (keyCode === 32) isIgnited = !isIgnited;
    if (key === 'p' || key === 'P') chuteDeployed = true;
    if (key === 's' || key === 'S') {
        let sepY = -1;
        for(let i=parts.length-1; i>=0; i--) if(parts[i].type === 'SEP') { sepY = parts[i].gy; parts.splice(i, 1); break; }
        if(sepY != -1) parts = parts.filter(p => p.gy < sepY);
    }
  }
}
function windowResized() { createCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
