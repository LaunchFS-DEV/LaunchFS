<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchFS - Space Sim</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let state = 'HOME'; let parts = []; let currentPart = 'TANK_MED'; 
let pos, vel, angle, fuel, throttle, isIgnited; let stars = []; 
const GRID_SIZE = 30; let chuteDeployed = false;

// Moon Settings
let moonPos;
const MOON_ALT = -15000;
const MOON_SIZE = 800;

function setup() {
  createCanvas(windowWidth, windowHeight);
  for (let i = 0; i < 400; i++) stars.push({x: random(-5000, 5000), y: random(-20000, 500), s: random(1,3)});
  moonPos = createVector(2000, MOON_ALT);
  resetFlight();
}

function resetFlight() {
  pos = createVector(0, 0); vel = createVector(0, 0);
  angle = 0; throttle = 0; fuel = 0; isIgnited = false; chuteDeployed = false;
}

function draw() {
  if (state === 'HOME') drawHome();
  else if (state === 'EDITOR') drawEditor();
  else if (state === 'FLIGHT') drawFlight();
}

function drawHome() {
  background(10, 15, 30);
  // Logo
  noStroke(); fill(255, 200, 0); textAlign(CENTER);
  textSize(80); text("🚀", width/2, height/3 - 40);
  fill(255); textSize(50); text("LaunchFS", width/2, height/3 + 40);
  
  // Controls Info
  fill(150); textSize(16);
  text("WASD/Arrows: Rotate & Throttle | Space: Ignite\nP: Parachute | S: Separate", width/2, height - 50);

  // Play Button
  fill(0, 120, 255); rect(width/2 - 100, height/2, 200, 60, 10);
  fill(255); textSize(24); text("START MISSION", width/2, height/2 + 38);
}

function drawEditor() {
  background(25); stroke(40);
  for (let x = 150; x < width; x += GRID_SIZE) line(x, 0, x, height);
  for (let y = 0; y < height; y += GRID_SIZE) line(150, y, width, y);
  for (let p of parts) drawPart(p, 150 + p.gx*GRID_SIZE, p.gy*GRID_SIZE, false);
  
  noStroke(); fill(20); rect(0, 0, 150, height);
  let menu = ['CAPSULE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
  for (let i = 0; i < menu.length; i++) {
    fill(currentPart === menu[i] ? (menu[i] === 'DELETE' ? [200,0,0] : [0, 150, 255]) : 50);
    rect(10, 10 + i * 55, 130, 50, 5);
    fill(255); textSize(12); textAlign(CENTER); text(menu[i], 75, 40 + i * 55);
  }
  
  fill(100); rect(10, height-60, 130, 45, 5); fill(255); text("HOME", 75, height-32);
  fill(0, 200, 100); rect(width-160, 20, 140, 60, 10); fill(255); textSize(20); text("LAUNCH", width-90, 55);
  if(mouseX > 150) { fill(255, 50); rect(floor(mouseX/GRID_SIZE)*GRID_SIZE, floor(mouseY/GRID_SIZE)*GRID_SIZE, GRID_SIZE, GRID_SIZE); }
}

function drawFlight() {
  let alt = abs(pos.y);
  let sky = lerpColor(color(100, 180, 255), color(0), map(alt, 0, 5000, 0, 1));
  background(sky);
  
  push();
  translate(width/2, height/2);
  translate(-pos.x, -pos.y + height/4);

  // Space/Stars
  fill(255); for(let s of stars) circle(s.x, s.y, s.s);
  
  // The Moon
  fill(200); ellipse(moonPos.x, moonPos.y, MOON_SIZE);
  fill(150); ellipse(moonPos.x - 100, moonPos.y + 50, 100); ellipse(moonPos.x + 150, moonPos.y - 80, 150);

  // The Earth
  fill(40); noStroke(); rect(-5000, 25, 10000, 2000); 
  fill(0, 150, 50); rect(-200, 20, 400, 10); // Pad

  // Gravity Physics
  let distToMoon = dist(pos.x, pos.y, moonPos.x, moonPos.y);
  if (distToMoon < MOON_SIZE/2 + 50) {
      vel.mult(0.9); // Landing friction
      if(distToMoon < MOON_SIZE/2) pos.sub(vel);
  } else if (alt > 10) {
      vel.add(0, 0.1); // Earth Gravity
      if(distToMoon < 2000) { // Moon Gravity well
          let g = p5.Vector.sub(moonPos, pos).normalize().mult(0.15);
          vel.add(g);
      }
  } else {
      vel.mult(0.8); pos.y = 0; vel.y = min(vel.y, 0);
  }

  // Parachute Logic
  if (chuteDeployed && alt > 20) {
      vel.y *= 0.95; vel.x *= 0.98;
      stroke(255); line(pos.x, pos.y, pos.x, pos.y - 60);
      fill(255, 100, 100); arc(pos.x, pos.y - 80, 80, 60, PI, 0);
  }

  // Engines
  if (isIgnited && fuel > 0) {
    for (let p of parts) {
      if (p.type.startsWith('ENG') && p.active) {
        let pwr = p.type === 'ENG_LRG' ? 0.6 : 0.35;
        vel.add(p5.Vector.fromAngle(angle - HALF_PI).mult(throttle * pwr));
        fuel -= throttle * pwr * 0.05;
        fill(255, 150, 0); circle(pos.x + (p.gx-parts[0].gx)*30 + 15, pos.y + (p.gy-parts[0].gy)*30 + 25, throttle * 40);
      }
    }
  }

  if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) angle -= 0.04;
  if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) angle += 0.04;
  if (keyIsDown(SHIFT) || keyIsDown(87)) throttle = min(throttle + 0.01, 1);
  if (keyIsDown(CONTROL) || keyIsDown(83)) throttle = max(throttle - 0.01, 0);

  pos.add(vel);
  push(); translate(pos.x, pos.y); rotate(angle);
  let ox = parts[0].gx, oy = parts[0].gy;
  for (let p of parts) drawPart(p, (p.gx-ox)*30, (p.gy-oy)*30, p.active);
  pop(); pop();

  drawFlightUI();
}

function drawPart(p, x, y, active) {
  stroke(0); if (p.type === 'CAPSULE') { fill(220); rect(x, y, 30, 30, 8); }
  else if (p.type.startsWith('TANK')) { fill(255); rect(x, y, 30, p.type === 'TANK_LRG' ? 60 : 40); }
  else if (p.type.startsWith('ENG')) { fill(active ? [255,100,0] : 80); rect(x+5, y, 20, 20); }
  else if (p.type === 'SEP') { fill(255, 200, 0); rect(x, y+10, 30, 10); }
}

function drawFlightUI() {
  fill(0, 180); rect(10, 10, 200, 140, 10);
  fill(255); textAlign(LEFT); textSize(14);
  text("ALTITUDE: " + floor(abs(pos.y)) + "m", 25, 40);
  text("H-VEL: " + nf(vel.x, 1, 1) + "m/s", 25, 65);
  text("V-VEL: " + nf(-vel.y, 1, 1) + "m/s", 25, 90);
  text("FUEL: " + floor(fuel), 25, 115);
  
  // Minimap
  fill(0, 150); rect(width-160, 10, 150, 150, 10);
  fill(100); circle(width-85, 140, 120); // Earth line
  fill(200); let mx = map(moonPos.x - pos.x, -5000, 5000, width-160, width-10);
  let my = map(moonPos.y - pos.y, -15000, 5000, 10, 160);
  circle(mx, my, 15); // Moon icon
  fill(0, 255, 0); circle(width-85, 85, 5); // Player icon

  fill(100); rect(width-80, height-50, 70, 40, 5); fill(255); textAlign(CENTER); text("EXIT", width-45, height-25);
}

function mousePressed() {
  if (state === 'HOME') state = 'EDITOR';
  else if (state === 'EDITOR') {
    if (mouseX < 150) {
      if (mouseY > height - 60) state = 'HOME';
      else {
        let idx = floor((mouseY-10)/55);
        let m = ['CAPSULE', 'TANK_MED', 'TANK_LRG', 'ENG_MED', 'ENG_LRG', 'SEP', 'DELETE'];
        if(idx >= 0 && idx < m.length) currentPart = m[idx];
      }
    } else if (mouseX > width-160 && mouseY < 80) {
      if(parts.length > 0) { state = 'FLIGHT'; fuel = parts.length * 200; pos.y = -60; }
    } else {
      if (currentPart === 'DELETE') {
         let gx = floor((mouseX-150)/GRID_SIZE), gy = floor(mouseY/GRID_SIZE);
         parts = parts.filter(p => !(p.gx === gx && p.gy === gy));
      } else {
         parts.push({type: currentPart, gx: floor((mouseX-150)/GRID_SIZE), gy: floor(mouseY/GRID_SIZE), active: false});
      }
    }
  } else if (state === 'FLIGHT') {
    if (mouseX > width-80 && mouseY > height-50) { state = 'EDITOR'; resetFlight(); }
    let mx = mouseX - width/2 + pos.x, my = mouseY - height/2 + pos.y - height/4;
    for(let p of parts) {
      let px = (p.gx-parts[0].gx)*30, py = (p.gy-parts[0].gy)*30;
      if(mx > px && mx < px+30 && my > py && my < py+30 && p.type.startsWith('ENG')) p.active = !p.active;
    }
  }
}

function keyPressed() {
  if (state === 'FLIGHT') {
    if (keyCode === 32) isIgnited = !isIgnited;
    if (key === 'p' || key === 'P') chuteDeployed = true;
    if (key === 's' || key === 'S') {
        let sepY = -1;
        for(let i=parts.length-1; i>=0; i--) if(parts[i].type === 'SEP') { sepY = parts[i].gy; parts.splice(i, 1); break; }
        if(sepY != -1) parts = parts.filter(p => p.gy < sepY);
    }
  }
}
function windowResized() { createCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
